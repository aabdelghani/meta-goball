# GoBall Fleet Agent Configuration
# Edit venue/location after flashing. Certs must be deployed per-device.

# --- Server Connection ---
MQTT_BROKER_HOST=47.201.20.8
MQTT_BROKER_PORT=8883

# --- Credentials (ignored when mTLS certs are set) ---
MQTT_USERNAME=goball
MQTT_PASSWORD=changeme

# --- Venue Info (edit per device) ---
VENUE_NAME=Unconfigured
DEVICE_LABEL=Hole 1

# --- Location (edit per device) ---
LATITUDE=0
LONGITUDE=0

# --- Fleet HTTP (for OTA updates) ---
FLEET_HTTP_PORT=8000

# --- Telemetry ---
PUBLISH_INTERVAL=30

# --- Fan Control ---
FAN_ENABLED=1
FAN_TEMP_OFF=40
FAN_TEMP_LOW=50
FAN_TEMP_HIGH=70
FAN_PWM_MIN=80
FAN_PWM_MAX=255

# --- mTLS (deploy certs per-device after flashing) ---
MQTT_TLS_CA=/etc/goball-agent/ca.crt
MQTT_TLS_CERT=/etc/goball-agent/client.crt
MQTT_TLS_KEY=/etc/goball-agent/client.key
